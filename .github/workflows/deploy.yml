name: CD

on:
  workflow_run:
    workflows:
      - .NET
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: website
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: publish      
      - name: Stop IIS
        shell: powershell
        run: |
          iisreset /stop


   

